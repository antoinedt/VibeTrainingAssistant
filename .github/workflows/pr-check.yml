name: PR Build Check

# Validates that the app still compiles on pull requests. The release build
# (build.yml) only runs on main, so without this a compile error wouldn't be
# caught until after merge, when the APK silently fails to update.
on:
  pull_request:
    branches: [main]

jobs:
  build-check:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'

      - uses: gradle/actions/setup-gradle@v3
        with:
          gradle-version: '8.7'

      - name: Set Android SDK path
        run: echo "sdk.dir=$ANDROID_SDK_ROOT" > local.properties

      - name: Build Debug APK
        run: gradle assembleDebug
