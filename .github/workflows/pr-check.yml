name: PR Build Check

# Validates that the app still compiles on pull requests. The release build
# (build.yml) only runs on main, so without this a compile error wouldn't be
# caught until after merge, when the APK silently fails to update.
on:
  pull_request:
    branches: [main]
  # Also run on direct pushes to any non-main branch. A push-triggered workflow
  # reliably runs from the branch's own workflow file (unlike a pull_request
  # workflow added within the PR), so this is what actually validates feature
  # branches. main is excluded — build.yml already builds and publishes there.
  push:
    branches-ignore: [main]

jobs:
  build-check:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'

      - uses: gradle/actions/setup-gradle@v3
        with:
          gradle-version: '8.7'

      - name: Set Android SDK path
        run: echo "sdk.dir=$ANDROID_SDK_ROOT" > local.properties

      - name: Build Debug APK
        run: gradle assembleDebug
